name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, TypeCheck, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test
        env:
          NODE_ENV: test

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production
          # Real secrets are injected from GitHub repository secrets (Settings → Secrets → Actions).
          # If the secret is not set, the placeholder keeps CI green for open-source contributors
          # while ensuring the app cannot run with real data without proper credentials.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'dev-placeholder-ci-build-only' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'dev-placeholder-jwt-secret-ci-build-only-32+chars' }}
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/web/.next
            apps/api/dist
          retention-days: 7
